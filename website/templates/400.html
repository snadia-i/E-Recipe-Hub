{% extends "base.html" %}
{% block title %}Request Error · E-Recipe Hub{% endblock %}
{% block body_class %}error-page{% endblock %}
{% block body %}
<section class="error-card">
    <div class="error-code">400</div>
    <h1>We could not process that request.</h1>
    <p>{{ message or 'Check the submitted information and try again.' }}</p>
    <a class="btn btn-primary" href="{{ url_for('main') }}">Return home</a>
</section>
{% endblock %}
